[package]
name = "cenv-rs"
version = "0.1.0"
edition = "2024"
authors = ["Nils Pukropp <nils@narl.io>"]

[[bin]]
name = "cenv"
path = "src/main.rs"

[dependencies]
crossterm = "0.29.0"
dirs = "6.0.0"
ratatui = "0.30.0"
serde = { version = "1.0.228", features = ["derive"] }
toml = "1.0.6"

[dev-dependencies]
tempfile = "3.27.0"
